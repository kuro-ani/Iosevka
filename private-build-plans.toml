[buildPlans.iosevkacustom]
family = "Iosevka Custom"
spacing = "term"
serifs = "sans"
no-cv-ss = false
no-ligation = false

  [buildPlans.iosevkacustom.names]
  family = "Iosevka Custom"
  subfamily = "Regular"
  full = "Iosevka Custom Regular"
  postscript = "Iosevka-Custom-Regular"

  [buildPlans.iosevkacustom.variants.design]
  cv10 = 22
  cv19 = 3
  cv20 = 4
  cv22 = 3
  cv26 = 2
  cv32 = 45
  cv33 = 4
  cv36 = 2
  cv41 = 20
  cv42 = 12
  cv44 = 2
  cv45 = 7
  cv46 = 21
  cv47 = 12
  cv51 = 8
  cv52 = 17
  cv56 = 4
  cv57 = 25
  cv58 = 12
  cv59 = 18
  cv60 = 19
  # 数値ではなく、現在のIosevkaが理解できる名前に修正
  capital-i = "serifed"
  capital-l = "serifed"
  t = "standard"

[buildPlans.iosevkacustom.weights.Regular]
shape = 400
menu  = 400
css   = 400

[buildPlans.iosevkacustom.slopes.Upright]
angle = 0
shape = "upright"
menu  = "upright"
css   = "normal"
