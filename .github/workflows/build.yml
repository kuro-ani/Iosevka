name: Build Custom Sarasa
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install
          npm install -g yoseka

      - name: Build Iosevka (Latin Part)
        env:
          IOSEVKA_CUSTOM_PLAN_PATH: private-build-plans.toml
        run: npm run build -- ttf::iosevkacustom

      - name: Download Source Han Sans (Japanese Part)
        run: |
          # AdobeのGitHubから源ノ角ゴシック(Regular)を取得
          curl -L -O https://github.com

      - name: Combine Fonts (Yoseka)
        run: |
          # ビルドされたIosevkaを探して合成を実行
          # --latin-scale 1.05 は更紗らしいバランスにするための微調整です
          LATIN_FONT=$(find dist -name "iosevkacustom-Regular.ttf" | head -n 1)
          yoseka --base SourceHanSans-Regular.otf --latin "$LATIN_FONT" --latin-scale 1.05 --out MySarasa-Regular.ttf

      - name: Upload Finished Font
        uses: actions/upload-artifact@v4
        with:
          name: my-custom-sarasa
          path: MySarasa-Regular.ttf
