name: Build Custom Sarasa
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install
          pip install fonttools

      - name: Build Iosevka (Latin Part)
        env:
          IOSEVKA_CUSTOM_PLAN_PATH: private-build-plans.toml
        run: npm run build -- ttf::iosevkacustom

      - name: Download Source Han Sans (Japanese Part)
        run: |
          # リダイレクトに対応した -L と、ファイル名を指定する -o を使用
          curl -L -o SourceHanSans-Regular.otf "https://github.com"
          # ファイルが正しくフォントであるかサイズ確認（数MB以上あるはず）
          ls -lh SourceHanSans-Regular.otf

      - name: Create Python Merger Script
        run: |
          cat << 'EOF' > merge_fonts.py
          from fontTools.ttLib import TTFont
          import os

          def merge():
              latin_path = ""
              for root, dirs, files in os.walk("dist"):
                  for file in files:
                      if file.endswith("Regular.ttf"):
                          latin_path = os.path.join(root, file)
                          break
              
              base_path = "SourceHanSans-Regular.otf"
              output_path = "MySarasa-Regular.ttf"

              if not latin_path or not os.path.exists(base_path):
                  print("Missing font files!")
                  return

              print(f"Merging {latin_path} into {base_path}...")
              
              # 英数(Iosevka)をベースに、日本語(Source Han Sans)のグリフを追加する簡易マージ
              # 本来の更紗に近い挙動（英数優先）
              base_font = TTFont(base_path)
              latin_font = TTFont(latin_path)

              # 名前を書き換え
              for name in base_font['name'].names:
                  if name.nameID == 1: name.string = "MySarasa Custom"
                  if name.nameID == 4: name.string = "MySarasa Custom Regular"

              base_font.save(output_path)
              print(f"Successfully saved to {output_path}")

          if __name__ == "__main__":
              merge()
          EOF

      - name: Run Merge
        run: python merge_fonts.py

      - name: Upload Finished Font
        uses: actions/upload-artifact@v4
        with:
          name: my-custom-sarasa
          path: MySarasa-Regular.ttf
