name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install

      - name: Build Font
        # 出力先を contents/ に指定します
        run: npm run build -- --plan-file private-build-plans.toml Iosevka-Custom --contents contents/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          # contents フォルダ以下のすべての .ttf ファイルを探して保存します
          path: contents/**/*.ttf
