name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install

      - name: Build Font
        # プラン名に基いた出力パスを指定します
        run: npm run build -- contents/Iosevka-Custom/ttf --plan-file private-build-plans.toml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          path: dist/
