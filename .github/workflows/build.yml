name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install
      - name: Build
        # "iosevka-custom" は private-build-plans.toml 内の名前と一致させる必要があります
        run: npx iosevka-build Iosevka-Custom --contents dist/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          path: dist/
