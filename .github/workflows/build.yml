name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install

      - name: Build Font
        # プラン名とファイル名を明示的に指定して実行します
        run: npm run build -- Iosevka-Custom --plan-file private-build-plans.toml --contents dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          path: dist/
