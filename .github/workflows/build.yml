name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install

      - name: Build Font
        # 出力先をあえて指定せず、標準の挙動に任せます
        run: npm run build -- --plan-file private-build-plans.toml Iosevka-Custom

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          # 階層を問わず、生成されたすべての .ttf ファイルを再帰的に探して全回収します
          path: "**/*.ttf"
          # もしファイルが見つからなかった場合にエラーとして報告させます
          if-no-files-found: error
