name: Build Custom Iosevka
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
          npm install

      - name: Build Font
        # 環境変数でプランファイルを指定し、TTF形式でビルドを実行
        env:
          IOSEVKA_CUSTOM_PLAN_PATH: private-build-plans.toml
        run: npm run build -- ttf::IosevkaCustom

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosevka-custom-font
          # ビルドされたすべての .ttf ファイルを回収
          path: "**/*.ttf"
          if-no-files-found: error
